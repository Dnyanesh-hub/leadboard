<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nerf Gun Target Challenge</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0a0a1a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Header ─────────────────────────────────────────────── */
  header {
    width: 100%;
    text-align: center;
    padding: 18px 10px 10px;
    background: linear-gradient(180deg, #111128 0%, #0a0a1a 100%);
    border-bottom: 2px solid #ff073a44;
  }
  header h1 {
    font-size: 1.6rem;
    letter-spacing: 4px;
    color: #ff073a;
    text-shadow: 0 0 10px #ff073a88;
  }
  header p {
    font-size: 0.85rem;
    color: #888;
    margin-top: 2px;
    letter-spacing: 2px;
  }

  /* ── Screens ────────────────────────────────────────────── */
  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 520px;
    padding: 24px 16px 40px;
    animation: fadeIn 0.4s ease;
  }
  .screen.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Common Elements ────────────────────────────────────── */
  h2 {
    font-size: 1.5rem;
    margin-bottom: 6px;
    text-align: center;
    color: #00e5ff;
    text-shadow: 0 0 8px #00e5ff66;
  }
  h3 {
    font-size: 1.15rem;
    color: #ccc;
    margin-bottom: 18px;
    text-align: center;
  }

  label {
    display: block;
    font-size: 0.9rem;
    color: #aaa;
    margin-bottom: 4px;
    margin-top: 14px;
    text-align: left;
    width: 100%;
  }

  input[type="text"],
  input[type="number"] {
    width: 100%;
    padding: 14px 16px;
    font-size: 1.1rem;
    border: 2px solid #333;
    border-radius: 10px;
    background: #151530;
    color: #fff;
    outline: none;
    transition: border-color 0.3s;
  }
  input:focus {
    border-color: #00e5ff;
    box-shadow: 0 0 8px #00e5ff44;
  }

  .btn {
    display: inline-block;
    padding: 14px 32px;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 1px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 22px;
    transition: transform 0.15s, box-shadow 0.25s;
    text-transform: uppercase;
  }
  .btn:active { transform: scale(0.96); }

  .btn-primary {
    background: linear-gradient(135deg, #ff073a, #ff4466);
    color: #fff;
    box-shadow: 0 0 18px #ff073a66;
  }
  .btn-primary:hover { box-shadow: 0 0 28px #ff073aaa; }

  .btn-secondary {
    background: linear-gradient(135deg, #00b8d4, #00e5ff);
    color: #000;
    box-shadow: 0 0 14px #00e5ff44;
  }
  .btn-secondary:hover { box-shadow: 0 0 24px #00e5ff88; }

  .btn-danger {
    background: linear-gradient(135deg, #880000, #cc0000);
    color: #fff;
    box-shadow: 0 0 12px #cc000044;
  }
  .btn-danger:hover { box-shadow: 0 0 22px #cc000088; }

  .error-msg {
    color: #ff4466;
    font-size: 0.85rem;
    margin-top: 4px;
    min-height: 20px;
  }

  /* ── Start Screen ───────────────────────────────────────── */
  #startScreen h2 { font-size: 1.8rem; margin-top: 20px; color: #ff073a; text-shadow: 0 0 12px #ff073a88; }
  #startScreen h3 { color: #00e5ff; }

  /* ── Game Screen ────────────────────────────────────────── */
  .info-bar {
    display: flex;
    justify-content: space-between;
    width: 100%;
    padding: 10px 0;
    border-bottom: 1px solid #222;
    margin-bottom: 16px;
  }
  .info-bar span { font-size: 0.95rem; color: #ccc; }
  .info-bar .highlight { color: #00e5ff; font-weight: 700; }

  .shot-counter {
    font-size: 1.3rem;
    font-weight: 700;
    color: #ff073a;
    text-shadow: 0 0 6px #ff073a66;
    margin-bottom: 10px;
  }

  /* Target board */
  .target-board {
    position: relative;
    width: 260px;
    height: 260px;
    margin: 10px auto 20px;
  }
  .target-ring {
    position: absolute;
    border-radius: 50%;
    border: 3px solid;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .target-ring span {
    font-size: 0.7rem;
    font-weight: 700;
    padding-bottom: 6px;
  }
  .ring-large {
    width: 240px; height: 240px;
    border-color: #00e5ff;
    box-shadow: 0 0 16px #00e5ff44 inset, 0 0 16px #00e5ff22;
    animation: pulseLarge 3s ease-in-out infinite;
  }
  .ring-large span { color: #00e5ff; }

  .ring-medium {
    width: 170px; height: 170px;
    border-color: #39ff14;
    box-shadow: 0 0 14px #39ff1444 inset, 0 0 14px #39ff1422;
    animation: pulseMedium 3s ease-in-out 0.5s infinite;
  }
  .ring-medium span { color: #39ff14; }

  .ring-small {
    width: 100px; height: 100px;
    border-color: #ffea00;
    box-shadow: 0 0 12px #ffea0044 inset, 0 0 12px #ffea0022;
    animation: pulseSmall 3s ease-in-out 1s infinite;
  }
  .ring-small span { color: #ffea00; }

  .ring-bullseye {
    width: 44px; height: 44px;
    border-color: #ff073a;
    background: #ff073a22;
    box-shadow: 0 0 18px #ff073a66 inset, 0 0 18px #ff073a44;
    animation: pulseBull 2s ease-in-out infinite;
  }
  .ring-bullseye span { color: #ff073a; font-size: 0.65rem; padding-bottom: 2px; }

  @keyframes pulseLarge   { 0%,100%{ box-shadow:0 0 16px #00e5ff44 inset,0 0 16px #00e5ff22 } 50%{ box-shadow:0 0 28px #00e5ff66 inset,0 0 28px #00e5ff44 } }
  @keyframes pulseMedium  { 0%,100%{ box-shadow:0 0 14px #39ff1444 inset,0 0 14px #39ff1422 } 50%{ box-shadow:0 0 24px #39ff1466 inset,0 0 24px #39ff1444 } }
  @keyframes pulseSmall   { 0%,100%{ box-shadow:0 0 12px #ffea0044 inset,0 0 12px #ffea0022 } 50%{ box-shadow:0 0 22px #ffea0066 inset,0 0 22px #ffea0044 } }
  @keyframes pulseBull    { 0%,100%{ box-shadow:0 0 18px #ff073a66 inset,0 0 18px #ff073a44 } 50%{ box-shadow:0 0 30px #ff073aaa inset,0 0 30px #ff073a66 } }

  .target-legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.8rem;
    color: #bbb;
  }
  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
  }

  .shots-display {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .shot-badge {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 2px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-weight: 700;
    color: #555;
    background: #111;
    transition: all 0.3s;
  }
  .shot-badge.filled {
    border-color: #00e5ff;
    color: #00e5ff;
    background: #00e5ff11;
    box-shadow: 0 0 8px #00e5ff44;
  }
  .shot-badge.missed {
    border-color: #ff073a;
    color: #ff073a;
    background: #ff073a11;
  }

  /* ── Result Screen ──────────────────────────────────────── */
  .result-score {
    font-size: 4rem;
    font-weight: 900;
    color: #ff073a;
    text-shadow: 0 0 20px #ff073a88;
    margin: 20px 0 4px;
  }
  .result-label { color: #888; font-size: 1rem; margin-bottom: 24px; }
  .result-name { font-size: 1.2rem; color: #00e5ff; margin-bottom: 4px; }

  /* ── Leaderboard ────────────────────────────────────────── */
  .lb-table-wrap {
    width: 100%;
    overflow-x: auto;
    margin-top: 14px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th {
    background: #151530;
    color: #00e5ff;
    padding: 10px 8px;
    font-size: 0.85rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 2px solid #00e5ff44;
  }
  td {
    padding: 10px 8px;
    text-align: center;
    font-size: 0.95rem;
    border-bottom: 1px solid #1a1a2e;
  }
  tr.highlight-row {
    background: #00e5ff11;
    box-shadow: inset 4px 0 0 #00e5ff;
  }
  tr.highlight-row td { color: #00e5ff; font-weight: 700; }
  tr:nth-child(even):not(.highlight-row) { background: #0d0d22; }

  .empty-lb {
    text-align: center;
    color: #555;
    padding: 40px 0;
    font-size: 1rem;
  }

  .btn-group {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ── Responsive ─────────────────────────────────────────── */
  @media (max-width: 420px) {
    .target-board { width: 200px; height: 200px; }
    .ring-large { width: 190px; height: 190px; }
    .ring-medium { width: 130px; height: 130px; }
    .ring-small { width: 76px; height: 76px; }
    .ring-bullseye { width: 34px; height: 34px; }
    .btn { padding: 12px 20px; font-size: 1rem; }
  }
</style>
</head>
<body>

<!-- ═══════════════ HEADER ═══════════════ -->
<header>
  <h1>NERF GUN EVENT</h1>
  <p>Literary &amp; Debate Club</p>
</header>

<!-- ═══════════════ 1. START SCREEN ═══════════════ -->
<div id="startScreen" class="screen active">
  <h2>NERF GUN TARGET CHALLENGE</h2>
  <h3>Literary &amp; Debate Club Event</h3>

  <label for="nameInput">Participant Name</label>
  <input type="text" id="nameInput" placeholder="Enter name" autocomplete="off">

  <label for="rollInput">Roll Number</label>
  <input type="text" id="rollInput" placeholder="Enter roll number" autocomplete="off">

  <p id="startError" class="error-msg"></p>

  <button class="btn btn-primary" id="startBtn">Start Game</button>
</div>

<!-- ═══════════════ 2. GAME SCREEN ═══════════════ -->
<div id="gameScreen" class="screen">
  <div class="info-bar">
    <span>Name: <span class="highlight" id="gName"></span></span>
    <span>Roll: <span class="highlight" id="gRoll"></span></span>
  </div>

  <div class="shot-counter" id="shotCounter">Shot 1 of 6</div>

  <!-- Target board visual -->
  <div class="target-board">
    <div class="target-ring ring-large"><span>2 pts</span></div>
    <div class="target-ring ring-medium"><span>5 pts</span></div>
    <div class="target-ring ring-small"><span>7 pts</span></div>
    <div class="target-ring ring-bullseye"><span>10</span></div>
  </div>

  <div class="target-legend">
    <span class="legend-item"><span class="legend-dot" style="background:#00e5ff"></span>Large — 2 pts</span>
    <span class="legend-item"><span class="legend-dot" style="background:#39ff14"></span>Medium — 5 pts</span>
    <span class="legend-item"><span class="legend-dot" style="background:#ffea00"></span>Small — 7 pts</span>
    <span class="legend-item"><span class="legend-dot" style="background:#ff073a"></span>Bullseye — 10 pts</span>
  </div>

  <div class="shots-display" id="shotsDisplay"></div>

  <label for="scoreInput">Enter Points Scored</label>
  <input type="number" id="scoreInput" placeholder="0, 2, 5, 7, or 10" autocomplete="off">
  <p id="gameError" class="error-msg"></p>

  <button class="btn btn-primary" id="submitShotBtn">Submit Shot</button>
</div>

<!-- ═══════════════ 3. RESULT SCREEN ═══════════════ -->
<div id="resultScreen" class="screen">
  <h2>🎯 Results</h2>
  <p class="result-name" id="rName"></p>
  <div class="result-score" id="rScore">0</div>
  <p class="result-label">Total Score</p>

  <div class="btn-group">
    <button class="btn btn-secondary" id="viewLbBtn">View Leaderboard</button>
    <button class="btn btn-primary" id="nextParticipantBtn">Next Participant</button>
  </div>
</div>

<!-- ═══════════════ 4. LEADERBOARD SCREEN ═══════════════ -->
<div id="leaderboardScreen" class="screen">
  <h2>🏆 Leaderboard</h2>

  <div class="lb-table-wrap" id="lbTableWrap"></div>

  <div class="btn-group">
    <button class="btn btn-primary" id="playNextBtn">Play Next Participant</button>
    <button class="btn btn-danger" id="resetLbBtn">Reset Leaderboard</button>
  </div>
</div>

<!-- ═══════════════ JAVASCRIPT ═══════════════ -->
<script>
  (function () {
    "use strict";

    /* ── State ──────────────────────────────────────────── */
    var currentName = "";
    var currentRoll = "";
    var shots = [];
    var currentShot = 0;
    var TOTAL_SHOTS = 6;
    var VALID_SCORES = [0, 2, 5, 7, 10];
    var LEADERBOARD_KEY = "nerfGunLeaderboard";
    var latestEntryId = "";

    /* ── DOM refs ───────────────────────────────────────── */
    var screens = {
      start: document.getElementById("startScreen"),
      game: document.getElementById("gameScreen"),
      result: document.getElementById("resultScreen"),
      leaderboard: document.getElementById("leaderboardScreen")
    };

    var nameInput = document.getElementById("nameInput");
    var rollInput = document.getElementById("rollInput");
    var startBtn = document.getElementById("startBtn");
    var startError = document.getElementById("startError");

    var gName = document.getElementById("gName");
    var gRoll = document.getElementById("gRoll");
    var shotCounter = document.getElementById("shotCounter");
    var shotsDisplay = document.getElementById("shotsDisplay");
    var scoreInput = document.getElementById("scoreInput");
    var submitShotBtn = document.getElementById("submitShotBtn");
    var gameError = document.getElementById("gameError");

    var rName = document.getElementById("rName");
    var rScore = document.getElementById("rScore");
    var viewLbBtn = document.getElementById("viewLbBtn");
    var nextParticipantBtn = document.getElementById("nextParticipantBtn");

    var lbTableWrap = document.getElementById("lbTableWrap");
    var playNextBtn = document.getElementById("playNextBtn");
    var resetLbBtn = document.getElementById("resetLbBtn");

    /* ── Helpers ─────────────────────────────────────────── */
    function showScreen(name) {
      Object.keys(screens).forEach(function (k) {
        screens[k].classList.remove("active");
      });
      screens[name].classList.add("active");
    }

    function getLeaderboard() {
      try {
        var data = localStorage.getItem(LEADERBOARD_KEY);
        return data ? JSON.parse(data) : [];
      } catch (e) {
        return [];
      }
    }

    function saveLeaderboard(lb) {
      localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(lb));
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substring(2, 7);
    }

    function escapeHtml(str) {
      var div = document.createElement("div");
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    /* ── Shot badges ─────────────────────────────────────── */
    function renderShotBadges() {
      var html = "";
      for (var i = 0; i < TOTAL_SHOTS; i++) {
        if (i < shots.length) {
          var cls = shots[i] === 0 ? "shot-badge filled missed" : "shot-badge filled";
          html += '<div class="' + cls + '">' + shots[i] + "</div>";
        } else {
          html += '<div class="shot-badge">-</div>';
        }
      }
      shotsDisplay.innerHTML = html;
    }

    /* ── Leaderboard table ───────────────────────────────── */
    function renderLeaderboard() {
      var lb = getLeaderboard();
      if (lb.length === 0) {
        lbTableWrap.innerHTML = '<p class="empty-lb">No scores yet. Start playing!</p>';
        return;
      }
      lb.sort(function (a, b) { return b.score - a.score; });

      var rows = "";
      for (var i = 0; i < lb.length; i++) {
        var entry = lb[i];
        var cls = entry.id === latestEntryId ? ' class="highlight-row"' : "";
        rows += "<tr" + cls + ">" +
          "<td>" + (i + 1) + "</td>" +
          "<td>" + escapeHtml(entry.name) + "</td>" +
          "<td>" + escapeHtml(entry.roll) + "</td>" +
          "<td>" + entry.score + "</td>" +
          "</tr>";
      }

      lbTableWrap.innerHTML =
        "<table>" +
        "<thead><tr><th>Rank</th><th>Name</th><th>Roll Number</th><th>Score</th></tr></thead>" +
        "<tbody>" + rows + "</tbody>" +
        "</table>";
    }

    /* ── Start Game ──────────────────────────────────────── */
    startBtn.addEventListener("click", function () {
      var name = nameInput.value.trim();
      var roll = rollInput.value.trim();

      if (!name) { startError.textContent = "Please enter the participant name."; return; }
      if (!roll) { startError.textContent = "Please enter the roll number."; return; }

      startError.textContent = "";
      currentName = name;
      currentRoll = roll;
      shots = [];
      currentShot = 0;

      gName.textContent = currentName;
      gRoll.textContent = currentRoll;
      shotCounter.textContent = "Shot 1 of " + TOTAL_SHOTS;
      scoreInput.value = "";
      gameError.textContent = "";
      renderShotBadges();
      showScreen("game");
      scoreInput.focus();
    });

    /* ── Submit Shot ─────────────────────────────────────── */
    submitShotBtn.addEventListener("click", submitShot);
    scoreInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") { submitShot(); }
    });

    function submitShot() {
      var raw = scoreInput.value.trim();
      if (raw === "") { gameError.textContent = "Please enter a score."; return; }

      var val = parseInt(raw, 10);
      if (!VALID_SCORES.includes(val)) {
        gameError.textContent = "Invalid score. Use 0, 2, 5, 7, or 10.";
        return;
      }

      gameError.textContent = "";
      shots.push(val);
      currentShot++;
      scoreInput.value = "";
      renderShotBadges();

      if (currentShot >= TOTAL_SHOTS) {
        finishGame();
      } else {
        shotCounter.textContent = "Shot " + (currentShot + 1) + " of " + TOTAL_SHOTS;
        scoreInput.focus();
      }
    }

    /* ── Finish Game ─────────────────────────────────────── */
    function finishGame() {
      var total = 0;
      for (var i = 0; i < shots.length; i++) { total += shots[i]; }

      /* Save to leaderboard */
      var id = generateId();
      latestEntryId = id;
      var lb = getLeaderboard();
      lb.push({ id: id, name: currentName, roll: currentRoll, score: total });
      saveLeaderboard(lb);

      /* Show result */
      rName.textContent = currentName;
      rScore.textContent = total;
      showScreen("result");
    }

    /* ── Result buttons ──────────────────────────────────── */
    viewLbBtn.addEventListener("click", function () {
      renderLeaderboard();
      showScreen("leaderboard");
    });

    nextParticipantBtn.addEventListener("click", goToStart);

    /* ── Leaderboard buttons ─────────────────────────────── */
    playNextBtn.addEventListener("click", goToStart);

    resetLbBtn.addEventListener("click", function () {
      if (confirm("Are you sure you want to reset the leaderboard? This cannot be undone.")) {
        localStorage.removeItem(LEADERBOARD_KEY);
        latestEntryId = "";
        renderLeaderboard();
      }
    });

    function goToStart() {
      nameInput.value = "";
      rollInput.value = "";
      startError.textContent = "";
      showScreen("start");
      nameInput.focus();
    }
  })();
</script>
</body>
</html>
